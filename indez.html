<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>para você</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* Estilo Geral e Fundo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            /* Fundo rosa bem claro */
            background-color: #fff0f3; 
            
            /* Padrão de corações em Pixel Art criados direto no código! */
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg' shape-rendering='crispEdges'%3E%3Cg fill='%23ffb3c6' fill-opacity='0.7'%3E%3Cpath d='M12 14h4v-4h4v4h4v4h-2v4h-2v4h-4v-4h-2v-4h-2z'/%3E%3Cpath d='M70 60h4v-4h4v4h4v4h-2v4h-2v4h-4v-4h-2v-4h-2z'/%3E%3Cpath d='M85 25h2v-2h2v2h2v2h-1v2h-1v2h-2v-2h-1v-2h-1z'/%3E%3Cpath d='M25 80h2v-2h2v2h2v2h-1v2h-1v2h-2v-2h-1v-2h-1z'/%3E%3C/g%3E%3C/svg%3E");
            background-repeat: repeat;
            
            font-family: 'VT323', monospace;
            overflow: hidden; /* Impede a tela de rolar quando o botão fugir */
        }

        /* --- TELA DO ENVELOPE --- */
        #envelope-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: transform 0.2s;
            padding: 20px;
        }

        #envelope-screen:hover {
            transform: scale(1.05); /* Dá uma leve aumentada quando passa o mouse no PC */
        }

        #envelope-img {
            width: 180px;
            max-width: 100%;
            image-rendering: pixelated;
            animation: bounce 2s infinite; /* Animação para o envelope flutuar */
        }

        .envelope-text {
            font-size: 32px;
            color: #555;
            margin-top: 15px;
            text-align: center;
        }

        /* Animação de flutuar */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* A Janela Principal (Escondida inicialmente) */
        .window {
            display: none; 
            background-color: #ffb3c6aa;
            border: 6px solid #040001;
            border-radius: 8px;
            width: 450px;
            max-width: 90%; /* Ajuste para caber em telas de celular */
            box-sizing: border-box; /* Garante que as bordas não quebrem o tamanho */
            padding: 10px;
            box-shadow: 4px 4px 0px #ff8fa3;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Cabeçalho da Janela (Barra de Título) */
        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ff758f;
            padding-bottom: 5px;
            margin-bottom: 15px;
            color: #ff4d6d;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .window-controls span {
            margin-left: 10px;
            cursor: default;
        }

        /* Corações do Topo */
        .hearts-top {
            color: #ff4d6d;
            margin-bottom: 10px;
            letter-spacing: 20px;
        }

        .hearts-top h2 {
            margin: 0;
            font-size: 30px;
        }

        /* Estilo do Texto */
        h2 {
            color: #333;
            font-size: 32px;
            margin: 10px 0;
            word-wrap: break-word; /* Evita que o texto saia da tela */
        }

        p {
            font-size: 22px;
            color: #555;
        }

        /* Imagens (Gatinhos) */
        img {
            width: 180px;
            max-width: 80%; /* Não deixa a imagem ser maior que a janela no celular */
            image-rendering: pixelated;
            margin: 15px 0;
        }

        /* Botões */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
        }

        .btn {
            background-color: #fff;
            border: 4px solid #ff758f;
            color: #ff758f;
            font-family: 'VT323', monospace;
            font-size: 28px;
            padding: 5px 25px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #ff8fa3;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #ff8fa3;
        }

        /* Esconde a segunda tela inicialmente */
        #success-screen {
            display: none;
        }

        /* --- AJUSTES PARA CELULARES (Telas Menores) --- */
        @media (max-width: 480px) {
            .envelope-text {
                font-size: 26px;
            }
            .window-header {
                font-size: 20px;
            }
            h2 {
                font-size: 24px;
            }
            .btn {
                font-size: 24px;
                padding: 5px 15px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="envelope-screen">
        <img src="_5.png" alt="Envelope fechado" id="envelope-img">
        <div class="envelope-text">♡ OS TREM MENINA ♡<br>PARA<br> VITÓRIA IMANUELE PENA MORAIS</div>
    </div>

    <div class="window" id="main-window">
        <div class="window-header">
            <span>PARA A MULHER MAIS LINDA</span>
            <div class="window-controls">
                <span>_</span>
                <span>O</span>
                <span>X</span>
            </div>
        </div>

        <div class="hearts-top"><h2>♥ ♥ ♥</h2></div>

        <div id="question-screen">
            <h2>SE QUER ME VER FINAL DE SEMANA FEDO?</h2>
            <img src="_4.gif" alt="Gatinho com coração">
            
            <div class="buttons-container">
                <button class="btn" id="btn-yes">YES</button>
                <button class="btn" id="btn-no">NO</button>
            </div>
        </div>

        <div id="success-screen">
            <h2>Yippeeee!</h2>
            <img src="_3.gif" alt="Gatinho feliz e animado">
            <h2>EU TAMBEM FEDO <br> ☆*: .｡. o(≧▽≦)o .｡.:*☆.<br>BEIJÃO MEU AMORR!</h2>
        </div>
    </div>

    <script>
        // Pegando os elementos do HTML
        const envelopeScreen = document.getElementById('envelope-screen');
        const mainWindow = document.getElementById('main-window');
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const questionScreen = document.getElementById('question-screen');
        const successScreen = document.getElementById('success-screen');

        // Ação de clicar no Envelope
        envelopeScreen.addEventListener('click', () => {
            envelopeScreen.style.display = 'none'; // Esconde o envelope
            mainWindow.style.display = 'block';    // Mostra a janela da pergunta
        });

        // Ação de clicar no SIM
        btnYes.addEventListener('click', () => {
            questionScreen.style.display = 'none'; // Esconde a pergunta
            successScreen.style.display = 'block'; // Mostra a comemoração
        });

        // Função para o botão NÃO fugir
        function fugirBotao(e) {
            // Se for no celular (touch), evita que o botão seja clicado acidentalmente
            if(e.type === 'touchstart') {
                e.preventDefault();
            }

            // Calcula o espaço máximo que o botão pode ir sem sumir da tela
            const maxX = window.innerWidth - btnNo.offsetWidth - 20;
            const maxY = window.innerHeight - btnNo.offsetHeight - 20;

            // Gera coordenadas aleatórias
            const x = Math.floor(Math.random() * maxX);
            const y = Math.floor(Math.random() * maxY);
            
            // Move o botão
            btnNo.style.position = 'fixed';
            // Math.max garante que o botão não vá para uma posição negativa (fora da tela por cima/esquerda)
            btnNo.style.left = `${Math.max(10, x)}px`;
            btnNo.style.top = `${Math.max(10, y)}px`;
        }

        // Adiciona a fuga tanto para o mouse (PC) quanto para o toque (Celular)
        btnNo.addEventListener('mouseover', fugirBotao);
        btnNo.addEventListener('touchstart', fugirBotao);
    </script>

</body>
</html>
